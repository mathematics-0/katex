<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KaTeX 数式エディタ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.11/katex.min.css" id="katex-css-fallback" disabled>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--panel:#161b24;--surface:#1e2535;--surface2:#252d40;
  --border:#2a3347;--text:#dde4f0;--muted:#5e6e90;
  --accent:#00d4a8;--accent-bg:rgba(0,212,168,.1);--accent-bd:rgba(0,212,168,.3);
  --orange:#ff7844;--green:#3dd68c;--red:#ff5f5f;
  --preview-bg:#ffffff;--preview-text:#1a1a2e;
  --preview-accent:#2563eb;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP',-apple-system,sans-serif;font-size:14px;line-height:1.5}
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* ── Header ─────────────────────────────────────────────────── */
.hdr{display:flex;align-items:center;gap:8px;padding:7px 11px;
  background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;min-height:44px}
.hdr-title{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.05em;flex:1}
.btn{padding:5px 12px;border:1px solid var(--border);border-radius:6px;
  font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;
  background:var(--surface2);color:var(--muted);-webkit-user-select:none;user-select:none}
.btn:hover{color:var(--accent);border-color:var(--accent-bd)}
.btn:active{transform:scale(.95)}
.btn.on{color:var(--accent);border-color:var(--accent-bd);background:var(--accent-bg)}
.btn-copy{background:var(--orange);color:#fff;border:none;padding:6px 14px;font-size:13px}
.btn-copy:hover{filter:brightness(1.1);color:#fff}
.btn-copy.ok{background:var(--green)}

/* ── Palette ─────────────────────────────────────────────────── */
.palette{background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.cat-tabs{display:flex;overflow-x:auto;padding:0 8px;
  border-bottom:1px solid var(--border);scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:7px 10px;background:none;border:none;
  border-bottom:2px solid transparent;color:var(--muted);font-family:inherit;
  font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-tab:hover{color:var(--text)}
.cat-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.sym-grid{display:flex;flex-wrap:wrap;gap:3px;padding:6px 8px;
  max-height:110px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sym-btn{min-width:42px;height:34px;padding:2px 6px;
  background:var(--surface);border:1px solid var(--border);border-radius:5px;
  color:var(--text);cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;transition:all .1s;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  overflow:hidden;user-select:none;-webkit-user-select:none}
.sym-btn:hover{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}
.sym-btn:active{transform:scale(.93)}
.sym-btn .katex{font-size:12px;pointer-events:none}

/* ── Numpad ─────────────────────────────────────────────────── */
/* 電卓配置：常に4列 */
.numpad{display:none;padding:4px 8px 6px;background:var(--panel);
  border-bottom:1px solid var(--border)}
.numpad.show{display:flex;justify-content:flex-start}
.numpad-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:3px;
  width:min(220px, 60vw); /* 電卓サイズに固定、広がらない */
}
.num-btn{height:38px;background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:15px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .1s;user-select:none;-webkit-user-select:none}
.num-btn:hover{border-color:var(--accent);color:var(--accent)}
.num-btn:active{transform:scale(.92);background:var(--accent-bg)}
/* 演算子ボタンに色付け */
.num-btn.op{color:var(--accent);border-color:var(--accent-bd)}
.num-btn.op:hover{background:var(--accent-bg)}

/* ── Main ─────────────────────────────────────────────────── */
.main{flex:1;display:flex;min-height:0;overflow:hidden}

/* デスクトップ：左右分割、タブなし */
@media(min-width:768px){
  .main{flex-direction:row}
  .editor-pane{flex:0 0 45%;border-right:1px solid var(--border)}
  .preview-pane{flex:1}
}

/* スマホ：上下分割 */
@media(max-width:767px){
  .main{flex-direction:column}
  .editor-pane{flex:0 0 35vh;min-height:120px}
  .preview-pane{flex:1;border-top:2px solid var(--border)}
}

/* ── Editor Pane ─────────────────────────────────────────────── */
.pane{display:flex;flex-direction:column;min-height:0;overflow:hidden}
.pane-label{padding:4px 11px;font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);background:var(--panel);
  border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:6px}
.pane-label .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5}
#editor{flex:1;background:var(--bg);border:none;outline:none;resize:none;
  padding:12px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:14px;line-height:1.85;caret-color:var(--accent);width:100%;tab-size:4}
#editor::placeholder{color:var(--muted);font-style:italic;font-size:13px}

/* ── Preview Pane ─────────────────────────────────────────────── */
.preview-pane{background:var(--preview-bg)}
.preview-inner{
  flex:1;overflow-y:auto;
  padding:24px 28px;
  background:var(--preview-bg);
  color:var(--preview-text);
  font-family:'Noto Sans JP',sans-serif;
  font-size:16px;
  line-height:2.0;
  /* ウェブページっぽいスタイル */
}
/* プレビュー内のウェブページ風スタイリング */
.preview-inner h1,.preview-inner h2,.preview-inner h3{
  font-weight:700;margin:1em 0 .4em;color:#111827}
.preview-inner p{margin:.4em 0;color:#374151}
.preview-inner hr{border:none;border-top:1px solid #e5e7eb;margin:1em 0}
.preview-inner:empty::before{
  content:'プレビューがここに表示されます';
  color:#9ca3af;font-style:italic;font-size:14px}
.preview-inner .err{color:var(--red);font-size:12px;font-family:'JetBrains Mono',monospace;
  background:#fff0f0;padding:1px 4px;border-radius:3px;border:1px solid #fca5a5}
.preview-inner .katex-display{overflow-x:auto;margin:8px 0;padding:8px 0}
/* ブロック数式の背景 */
.preview-inner .math-block{
  background:#f8fafc;border-left:3px solid var(--accent);
  padding:10px 16px;margin:12px 0;border-radius:0 6px 6px 0;overflow-x:auto}
/* インライン数式 */
.preview-inner .katex{font-size:1.1em;line-height:1}
.preview-inner .katex-display{font-size:1.15em}
/* KaTeX フォント読み込み確認用 */
.preview-inner .katex .katex-html{display:inline}

/* preview-pane のラベル */
.preview-pane .pane-label{
  background:#f1f5f9;border-bottom:1px solid #e2e8f0;color:#64748b}
.preview-pane .pane-label .dot{background:#22c55e;opacity:1;
  box-shadow:0 0 4px #22c55e80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Scrollbars ─────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.preview-inner::-webkit-scrollbar-thumb{background:#cbd5e1}

/* ── スマホ向け細かい調整 ─────────────────────────────────── */
@media(max-width:767px){
  .hdr-title{font-size:13px}
  .btn{padding:5px 9px;font-size:11px}
  .btn-copy{padding:5px 10px;font-size:12px}
  .sym-grid{max-height:90px}
  .sym-btn{min-width:38px;height:32px;font-size:11px}
  .numpad-grid{width:min(200px,55vw)}
  .num-btn{height:36px;font-size:14px}
  #editor{font-size:13px;padding:10px 12px}
  .preview-inner{padding:16px 14px;font-size:15px}
}
</style>
</head>
<body>
<div class="app">

  <header class="hdr">
    <div class="hdr-title">∑ KaTeX エディタ</div>
    <button class="btn" id="numpadToggle" onclick="toggleNumpad()">123</button>
    <button class="btn-copy btn" id="copyBtn" onclick="copyToClipboard()">コピー</button>
  </header>

  <div class="palette">
    <div class="cat-tabs" id="catTabs"></div>
    <div class="sym-grid" id="symGrid"></div>
  </div>

  <div class="numpad" id="numpad">
    <div class="numpad-grid" id="numpadGrid"></div>
  </div>

  <div class="main">
    <!-- 編集ペイン -->
    <div class="pane editor-pane" id="editorPane">
      <div class="pane-label"><span class="dot"></span>編集</div>
      <textarea id="editor"
        placeholder="ここに入力…&#10;例：$x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}$"></textarea>
    </div>

    <!-- プレビューペイン（常時表示・ウェブページ風） -->
    <div class="pane preview-pane" id="previewPane">
      <div class="pane-label"><span class="dot"></span>プレビュー（ライブ）</div>
      <div class="preview-inner" id="preview"></div>
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
  onerror="this.remove();var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.11/katex.min.js';s.onload=loadAutoRender;document.head.appendChild(s);"
  onload="loadAutoRender()"></script>
<script>
function loadAutoRender(){
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js';
  s.onerror=function(){
    var s2=document.createElement('script');
    s2.src='https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.11/contrib/auto-render.min.js';
    s2.onload=onAutoRenderReady;
    document.head.appendChild(s2);
  };
  s.onload=onAutoRenderReady;
  document.head.appendChild(s);
}
function onAutoRenderReady(){
  window._katexReady=true;
  if(window._pendingPreview){ window._pendingPreview=false; schedulePreview(); }
}
</script>
<script>
'use strict';

/* ─── Symbol data ─────────────────────────────────────────────────────────── */
const CATS = [
  {name:'演算', items:[

    {d:'\\nabla',i:'\\nabla '},
  ]},
  {name:'ギリシャ', items:[
    {d:'\\alpha',i:'\\alpha '},{d:'\\beta',i:'\\beta '},{d:'\\gamma',i:'\\gamma '},
    {d:'\\delta',i:'\\delta '},{d:'\\varepsilon',i:'\\varepsilon '},{d:'\\epsilon',i:'\\epsilon '},
    {d:'\\zeta',i:'\\zeta '},{d:'\\eta',i:'\\eta '},{d:'\\theta',i:'\\theta '},
    {d:'\\vartheta',i:'\\vartheta '},{d:'\\iota',i:'\\iota '},{d:'\\kappa',i:'\\kappa '},
    {d:'\\lambda',i:'\\lambda '},{d:'\\mu',i:'\\mu '},{d:'\\nu',i:'\\nu '},
    {d:'\\xi',i:'\\xi '},{d:'\\pi',i:'\\pi '},{d:'\\varpi',i:'\\varpi '},

    {d:'\\upsilon',i:'\\upsilon '},{d:'\\phi',i:'\\phi '},{d:'\\varphi',i:'\\varphi '},
    {d:'\\chi',i:'\\chi '},{d:'\\psi',i:'\\psi '},{d:'\\omega',i:'\\omega '},
    {d:'\\Gamma',i:'\\Gamma '},{d:'\\Delta',i:'\\Delta '},{d:'\\Theta',i:'\\Theta '},
    {d:'\\Lambda',i:'\\Lambda '},{d:'\\Xi',i:'\\Xi '},{d:'\\Pi',i:'\\Pi '},
    {d:'\\Sigma',i:'\\Sigma '},{d:'\\Upsilon',i:'\\Upsilon '},{d:'\\Phi',i:'\\Phi '},
    {d:'\\Psi',i:'\\Psi '},{d:'\\Omega',i:'\\Omega '},
  ]},
  {name:'括弧', items:[
    {d:'\\left(a\\right)',i:'\\left( §\\right)'},
    {d:'\\left[a\\right]',i:'\\left[ §\\right]'},
    {d:'\\left\\{a\\right\\}',i:'\\left\\{ §\\right\\}'},
    {d:'\\left|a\\right|',i:'\\left| §\\right|'},

    {d:'\\cup',i:'\\cup '},{d:'\\cap',i:'\\cap '},
    {d:'\\setminus',i:'\\setminus '},{d:'\\emptyset',i:'\\emptyset '},
    {d:'\\varnothing',i:'\\varnothing '},
    {d:'\\mathbb{R}',i:'\\mathbb{R}'},{d:'\\mathbb{Z}',i:'\\mathbb{Z}'},

  ]},
  {name:'装飾', items:[
    {d:'\\boldsymbol{a}',i:'\\boldsymbol{§}'},

    {l:'pmat 3×3',i:'\\begin{pmatrix} §& & \\\\ & & \\\\ & & \\end{pmatrix}'},
    {l:'vmat 2×2',i:'\\begin{vmatrix} §& \\\\ & \\end{vmatrix}'},
    {l:'bmat 2×2',i:'\\begin{bmatrix} §& \\\\ & \\end{bmatrix}'},
    {l:'\\\\',i:'\\\\ '},
    {l:'&',i:'& '},
    {l:'\\quad',i:'\\quad '},

/* ─── 数字パッド（電卓配置：4列） ──────────────────────────── */
/* 行順：7 8 9 ÷ / 4 5 6 × / 1 2 3 − / 0 . = + / ( ) n , */
const NUMPAD = [
  {l:'7',i:'7',op:false},{l:'8',i:'8',op:false},{l:'9',i:'9',op:false},{l:'÷',i:'\\div ',op:true},
  {l:'4',i:'4',op:false},{l:'5',i:'5',op:false},{l:'6',i:'6',op:false},{l:'×',i:'\\times ',op:true},
  {l:'1',i:'1',op:false},{l:'2',i:'2',op:false},{l:'3',i:'3',op:false},{l:'−',i:'-',op:true},
  {l:'0',i:'0',op:false},{l:'.',i:'.',op:false},{l:'=',i:'=',op:false},{l:'+',i:'+',op:true},
  {l:'(',i:'(',op:false},{l:')',i:')',op:false},{l:'n',i:'n',op:false},{l:',',i:',',op:false},
];

/* ─── State & DOM refs ─────────────────────────────────────── */
let activeCat = 0, numpadOn = false;
let lastSel = {start:0, end:0};
let previewTimer = null;

const editor      = document.getElementById('editor');
const previewEl   = document.getElementById('preview');
const catTabsEl   = document.getElementById('catTabs');
const symGridEl   = document.getElementById('symGrid');
const numpadEl    = document.getElementById('numpad');
const numpadGridEl= document.getElementById('numpadGrid');

/* ─── Build UI ─────────────────────────────────────────────── */
function buildUI() {
  CATS.forEach((cat, idx) => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (idx === 0 ? ' active' : '');
    btn.textContent = cat.name;
    btn.addEventListener('mousedown', e => e.preventDefault());
    btn.addEventListener('click', () => setCategory(idx));
    catTabsEl.appendChild(btn);
  });

  renderSymGrid(0);

  NUMPAD.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'num-btn' + (item.op ? ' op' : '');
    btn.textContent = item.l;
    btn.addEventListener('mousedown', e => e.preventDefault());
    btn.addEventListener('click', () => insertSym(item.i));
    numpadGridEl.appendChild(btn);
  });
}

function setCategory(idx) {
  activeCat = idx;
  catTabsEl.querySelectorAll('.cat-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  renderSymGrid(idx);
}

function renderSymGrid(idx) {
  symGridEl.innerHTML = '';
  CATS[idx].items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'sym-btn';
    if (item.l) {
      btn.textContent = item.l;
    } else {
      try {
        btn.innerHTML = katex.renderToString(item.d, {
          throwOnError: false, displayMode: false, maxSize: 2, maxExpand: 50
        });
      } catch(e) { btn.textContent = item.d; }
    }
    btn.title = item.i.replace('§','…');
    btn.addEventListener('mousedown', e => e.preventDefault());
    btn.addEventListener('click', () => insertSym(item.i));
    symGridEl.appendChild(btn);
  });
}

/* ─── Numpad toggle ─────────────────────────────────────────── */
function toggleNumpad() {
  numpadOn = !numpadOn;
  numpadEl.classList.toggle('show', numpadOn);
  document.getElementById('numpadToggle').classList.toggle('on', numpadOn);
}

/* ─── Editor interaction ────────────────────────────────────── */
function saveSel() {
  lastSel.start = editor.selectionStart;
  lastSel.end   = editor.selectionEnd;
}

editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') { e.preventDefault(); insertSym('\\quad '); }
});
['keyup','mouseup','select','blur'].forEach(ev => editor.addEventListener(ev, saveSel));
editor.addEventListener('touchend', () => setTimeout(saveSel, 0));
editor.addEventListener('input', () => { saveSel(); schedulePreview(); });

function insertSym(ins) {
  const {start, end} = lastSel;
  const val = editor.value;
  const sel = val.slice(start, end);
  let text, cur;
  if (ins.includes('§')) {
    const si = ins.indexOf('§');
    if (sel) {
      text = ins.replace('§', sel);
      cur  = start + text.length;
    } else {
      text = ins.replace('§', '');
      cur  = start + si;
    }
  } else {
    text = ins;
    cur  = start + text.length;
  }
  editor.value = val.slice(0, start) + text + val.slice(end);
  editor.focus();
  editor.setSelectionRange(cur, cur);
  lastSel = {start: cur, end: cur};
  schedulePreview();
}

/* ─── Preview rendering ─────────────────────────────────────── */
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const MATHS_RE = /\$\$([\s\S]*?)\$\$|\$((?:[^$\\]|\\[\s\S])*)\$|\\begin\{([a-zA-Z*]+)\}([\s\S]*?)\\end\{\3\}/g;

// デリミタなしの生LaTeX式かどうかを判定
function looksLikeMath(s) {
  const t = s.trim();
  if (!t) return false;
  // \コマンド名{ または \コマンド名\コマンド名 のように複数のLaTeXコマンドが含まれる
  const cmds = (t.match(/\\[a-zA-Z]+/g) || []).length;
  const braces = (t.match(/\{|\}/g) || []).length;
  // \から始まる or LaTeXコマンドが2個以上 or コマンド+中括弧の組み合わせ
  return /^\\[a-zA-Z]/.test(t) || cmds >= 2 || (cmds >= 1 && braces >= 2);
}

// テキストチャンクを段落 or 数式ブロックに変換
function renderTextChunk(chunk) {
  if (!chunk) return '';
  // 段落（空行で分割）ごとに処理
  return chunk.split(/\n\n+/).map(para => {
    const trimmed = para.trim();
    if (looksLikeMath(trimmed)) {
      // 行ごとに確認：数式行は math-block、普通のテキスト行はそのまま
      const lines = trimmed.split('\n');
      return lines.map(line => {
        const tl = line.trim();
        if (looksLikeMath(tl)) {
          return `<div class="math-block">${tryKatex(tl, true)}</div>`;
        } else {
          return esc(line);
        }
      }).join('<br>');
    } else {
      return esc(para).replace(/\n/g, '<br>');
    }
  }).join('</p><p>');
}

function renderMath(src) {
  let html = '', last = 0;
  MATHS_RE.lastIndex = 0;
  let m;
  while ((m = MATHS_RE.exec(src)) !== null) {
    // テキスト部分：生LaTeXも検出して数式ブロックに変換
    const textChunk = src.slice(last, m.index);
    if (textChunk) {
      html += renderTextChunk(textChunk);
    }
    // 数式部分
    if (m[1] !== undefined) {
      // $$...$$：ブロック数式
      html += `<div class="math-block">${tryKatex(m[1].trim(), true)}</div>`;
    } else if (m[2] !== undefined) {
      // $...$：インライン数式
      html += tryKatex(m[2], false);
    } else if (m[3] !== undefined) {
      // \begin{env}...\end{env}
      html += `<div class="math-block">${tryKatex(`\\begin{${m[3]}}${m[4]}\\end{${m[3]}}`, true)}</div>`;
    }
    last = m.index + m[0].length;
  }
  const tail = src.slice(last);
  if (tail) html += renderTextChunk(tail);
  return html ? `<p>${html}</p>` : '';
}

function tryKatex(tex, display) {
  if (!window.katex) return `<span class="err">KaTeX 読み込み中...</span>`;
  try {
    return katex.renderToString(tex, {
      throwOnError: false,
      displayMode: display,
      output: 'html',
      strict: false
    });
  } catch(e) {
    return `<span class="err">${esc(tex)}</span>`;
  }
}

function schedulePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(() => {
    if (!window.katex) { window._pendingPreview = true; return; }
    previewEl.innerHTML = renderMath(editor.value);
    // auto-render で $...$ 記法を補完（tryKatex で処理済みのものは二重にならない）
    if (window.renderMathInElement) {
      try {
        renderMathInElement(previewEl, {
          delimiters:[
            {left:'$$',right:'$$',display:true},
            {left:'$',right:'$',display:false},
            {left:'\\(',right:'\\)',display:false},
            {left:'\\[',right:'\\]',display:true}
          ],
          throwOnError: false
        });
      } catch(e){}
    }
  }, 60);
}

/* ─── Copy ──────────────────────────────────────────────────── */
function wrapWithDelimiters(src) {
  const t = src.trim();
  // すでに $$ または $ または \begin で囲まれているならそのまま
  if (/^\$\$[\s\S]*\$\$$/.test(t)) return t;            // $$ ... $$
  if (/^\$[^$][\s\S]*[^$]\$$/.test(t)) return t;        // $ ... $
  if (/^\\begin\{/.test(t)) return t;                    // \begin{...}
  // 混在テキスト（行内に $..$ や $$..$$ が含まれる）はそのまま
  if (/\$/.test(t)) return t;
  // デリミタなしの生LaTeX → $$ で包む（1行）
  return `$$${t}$$`;
}

async function copyToClipboard() {
  // 改行をスペースに潰して1行に → $$ で包む
  const text = wrapWithDelimiters(editor.value.replace(/\n/g, ' \\\\\\ ').trim());
  try {
    await navigator.clipboard.writeText(text);
  } catch(e) {
    const ta = Object.assign(document.createElement('textarea'),
      {value: text, style: 'position:fixed;opacity:0'});
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ コピー済み';
  btn.classList.add('ok');
  setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('ok'); }, 1600);
}

/* ─── Init ──────────────────────────────────────────────────── */
buildUI();
window._pendingPreview = false;
// KaTeX がすでに読み込まれていれば即プレビュー、まだなら onAutoRenderReady で実行
if (window.katex) { schedulePreview(); } else { window._pendingPreview = true; }

window.toggleNumpad    = toggleNumpad;
window.copyToClipboard = copyToClipboard;
</script>
</body>
